<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Icon Caption Test</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .drop { border: 2px dashed #666; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; margin: 1rem 0; }
    .drop:hover, .drop.dragover { border-color: #4a9eff; background: #f0f7ff; }
    input[type="file"] { display: none; }
    .preview { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .preview-item { position: relative; }
    .preview-item img { width: 64px; height: 64px; object-fit: contain; border: 1px solid #ccc; }
    .preview-item .cap { font-size: 11px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
    button { padding: 0.5rem 1rem; background: #4a9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #3a8eef; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #result { margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 6px; white-space: pre-wrap; }
    .err { color: #c44; }
  </style>
</head>
<body>
  <h1>Icon Caption Test</h1>
  <p>Drop, paste (Ctrl+V), or select icon images. Click "Get captions" to send to the server.</p>
  <div class="drop" id="drop">Drop images here or click to select</div>
  <input type="file" id="file" accept="image/*" multiple>
  <div class="preview" id="preview"></div>
  <button id="btn" disabled>Get captions</button>
  <div id="result"></div>

  <script>
    const API = window.location.origin;
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    let images = [];

    drop.onclick = () => fileInput.click();
    drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = (e) => {
      e.preventDefault();
      drop.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    };
    fileInput.onchange = () => addFiles(fileInput.files);

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const files = [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) files.push(file);
        }
      }
      if (files.length) {
        e.preventDefault();
        addFiles(files);
      }
    });

    function addFiles(files) {
      for (const f of files) {
        if (!f.type.startsWith('image/')) continue;
        const reader = new FileReader();
        reader.onload = () => {
          images.push(reader.result.split(',')[1]);
          renderPreview();
        };
        reader.readAsDataURL(f);
      }
    }

    function renderPreview() {
      preview.innerHTML = '';
      images.forEach((b64, i) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        const img = document.createElement('img');
        img.src = 'data:image/png;base64,' + b64;
        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = '—';
        cap.id = 'cap-' + i;
        div.appendChild(img);
        div.appendChild(cap);
        preview.appendChild(div);
      });
      btn.disabled = images.length === 0;
    }

    btn.onclick = async () => {
      btn.disabled = true;
      result.textContent = 'Loading...';
      try {
        const res = await fetch(API + '/captions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ images }),
        });
        const data = await res.json();
        if (!res.ok) {
          result.innerHTML = '<span class="err">' + (data.error || res.status) + '</span>';
          return;
        }
        data.captions.forEach((c, i) => {
          const el = document.getElementById('cap-' + i);
          if (el) el.textContent = c || '(empty)';
        });
        result.textContent = 'Done. ' + data.captions.length + ' captions.';
      } catch (e) {
        result.innerHTML = '<span class="err">' + e.message + '</span>';
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
